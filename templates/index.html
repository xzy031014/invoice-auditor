<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业报销单智能审核助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); color: white; padding: 30px 0; text-align: center; }
        .header h1 { font-size: 26px; font-weight: 600; margin-bottom: 8px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .pipeline { display: flex; justify-content: space-between; background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .step { flex: 1; text-align: center; position: relative; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #e8e8e8; color: #8c8c8c; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-weight: bold; font-size: 14px; }
        .step.active .step-circle { background: #1890ff; color: white; }
        .step.completed .step-circle { background: #52c41a; color: white; }
        .step-label { font-size: 12px; color: #8c8c8c; margin-top: 5px; }
        .step.active .step-label { color: #1890ff; font-weight: bold; }

        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); min-height: 400px; }
        .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #1f1f1f; }

        .upload-zone { border: 2px dashed #d9d9d9; border-radius: 8px; padding:40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-zone:hover { border-color: #1890ff; background: #f6ffed; }
        .upload-zone p { color: #595959; margin: 5px 0; }

        .btn { padding: 12px 30px; border: border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-secondary { background: #f0f0f0; color: #595959; }
        .btn-secondary:hover { background: #d9d9d9; }
        .btn-success { background: #52c41a; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-group { display: flex; justify-content: space-between; margin-top: 30px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 5px; color: #262626; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #1890ff; }

        .preview { background: #fafafa; border-radius: 6px; padding: 15px; margin: 15px 0; }
        .preview-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e8e8e8; }
        .preview-item:last-child { border-bottom: none; }
        .preview-label { color: #8c8c8c; font-size: 13px; }
        .preview-value { font-weight: 500; color: #1f1f1f; }

        .info { background: #e6f7ff; border-left: 4px solid #1890ff; padding: 12px 15px; margin: 15px 0; border-radius: 4px; }
        .info p { color: #0050b3; font-size: 13px; margin: 0; }

        .success { background: #f6ffed; border-left: 4px solid #52c41a; padding: 12px 15px; margin: 15px 0; border-radius: 4px; }
        .success p { color: #237804; font-size: 13px; margin: 5px 0; }

        .error { background: #fff2f0; border-left: 4px solid #ff4d4f; padding: 12px 15px; margin: 15px 0; border-radius: 4px; }
        .error p { color: #a8071a; font-size: 13px; 5px 0; }

        .step-content { display: none; }
        .step-content.active { display: block; }

        .loading { text-align: center; padding: 30px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #1890ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .invoice-card { background: white; border: 1px solid #e8e8e8; border-radius: 6px; padding: 15px; margin: 10px 0; }
        .invoice-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #1f1f1f; }
        .invoice-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .invoice-info div { color: #595959; }
        .invoice-info div span { color: #262626; font-weight: 500; }

        .result-card { background: #fafafa; border-radius: 8px; padding: 20px; margin: 10px 0; }
        .result-card.pass { border-left: 4px solid #52c41a; background: #f6ffed; }
        .result-card.fail { border-left: 4px solid #ff4d4f; background: #fff2f0; }
        .result-card h3 { margin-top: 0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧾 企业报销单智能审核助手</h1>
        <p>流水线式审核系统</p>
    </div>

    <div class="container">
        <!-- 进度条 -->
        <div class="pipeline">
            <div class="step active" data-step="1">
                <div class="step-circle">1</div>
                <div class="step-label">上传发票</div>
            </div>
            <div class="step" data-step="2">
                <div class="step-circle">2</div>
                <div class="step-label">确认信息</div>
            </div>
            <div class="step" data-step="3">
                <div class="step-circle">3</div>
                <div class="step-label">填写申请</div>
            </div>
            <div class="step" data-step="4">
                <div class="step-circle">4</div>
                <div class="step-label">审核结果</div>
            </div>
        </div>

        <!-- 步骤1: 上传发票 -->
        <div class="step-content active" data-step="1">
            <h2>第一步：上传发票图片</h2>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadFile(this)">
                <div style="font-size: 36px">📁</div>
                <p>点击或拖拽上传发票图片</p>
                <p style="color:#bfbfbf;font-size:12px">支持 JPG、PNG、BMP 格式</p>
            </div>
            <div id="uploadResult"></div>
            <div class="btn-group">
                <button class="btn btn-secondary disabled">上一步</button>
                <button class="btn btn-primary" id="step1Next" disabled>下一步 →</button>
            </div>
        </div>

        <!-- 步骤2: 确认信息 -->
        <div class="step-content" data-step="2">
            <h2>第二步：确认识别信息</h2>
            <div id="invoiceInfo"></div>
            <div class="info">
                <p>💡 请核对识别结果，如有问题可以返回重新上传</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToStep(1)">← 上一步</button>
                <button class="btn btn-primary" onclick="goToStep(3)">下一步 →</button>
            </div>
        </div>

        <!-- 步骤3: 填写申请 -->
        <div class="step-content" data-step="3">
            <h2>第三步：填写报销申请</h2>

            <div id="invoiceSummary"></div>

            <div style="margin-top: 20px;">
                <div class="form-group">
                    <label>申请人 *</label>
                    <input type="text" id="applicant" placeholder="请输入申请人姓名">
                </div>
                <div class="form-group">
                    <label>部门</label>
                    <input type="text" id="department" placeholder="请输入部门">
                </div>
                <div class="form-group">
                    <label>申请金额 *</label>
                    <input type="number" id="amount" step="0.01" placeholder="请输入申请金额">
                </div>
                <div class="form-group">
                    <label>报销说明</label>
                    <input type="text" id="description" placeholder="请输入报销说明">
                </div>
            </div>

            <div class="info">
                <p>💡 申请金额将与所有发票总额进行对比审核</p>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="goToStep(2)">← 上一步</button>
                <button class="btn btn-success" onclick="submitApplication()">提交审核 →</button>
            </div>
        </div>

        <!-- 步骤4: 审核结果 -->
        <div class="step-content" data-step="4">
            <h2>第四步：审核结果</h2>
            <div id="auditResult"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="resetAll()">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let invoiceData = null;

        // 步骤切换
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'completed'));
            document.querySelectorAll('.step-content').forEach(c => c.classList.remove('active'));

            for(let i = 1; i < step; i++) {
                document.querySelector(`.step[data-step="${i}"]`).classList.add('completed');
            }

            document.querySelector(`.step[data-step="${step}"]`).classList.add('active');
            document.querySelector(`.step-content[data-step="${step}"]`).classList.add('active');

            currentStep = step;

            if(step === 2) showInvoiceInfo();
            if(step === 3) showInvoiceSummary();
        }

        // 上传发票
        async function uploadFile(input) {
            const file = input.files[0];
            if(!file) return;

            const resultDiv = document.getElementById('uploadResult');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在识别中，请稍候...</p></div>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if(data.success) {
                    invoiceData = data.invoice;
                    resultDiv.innerHTML = '<div class="success"><p>识别成功！</p>' +
                        '<div class="invoice-card"><h3>' + data.invoice.original_filename + '</h3>' +
                        '<div class="invoice-info">' +
                        '<div>文件名：' + (data.invoice.original_filename || '') + '</div>' +
                        '<div>发票号码：<span>' + (data.invoice.invoice_number || '未识别') + '</span></div>' +
                        '<div>发票金额：<span>¥' + (data.invoice.amount || 0).toFixed(2) + '</span></div>' +
                        '<div>开票日期：' + (data.invoice.date || '未识别') + '</span></div>' +
                        '</div></div>';

                    document.getElementById('step1Next').disabled = false;
                    document.getElementById('step1Next').onclick = () => goToStep(2);
                } else {
                    resultDiv.innerHTML = '<div class="error"><p>识别失败：' + data.error + '</p></div>';
                }
            } catch(e) {
                resultDiv.innerHTML = '<div class="error"><p>上传失败：' + e + '</p></div>';
            }
        }

        // 显示发票信息
        function showInvoiceInfo() {
            if(!invoiceData) return;

            const infoDiv = document.getElementById('invoiceInfo');
            infoDiv.innerHTML = '<div class="invoice-card"><h3>' + (invoiceData.original_filename || invoiceData.file_name) + '</h3>' +
                '<div class="invoice-info">' +
                '<div>发票号码：<span>' + (invoiceData.invoice_number || '未识别') + '</span></div>' +
                '<div>发票金额：<span>¥' + (invoiceData.amount || 0).toFixed(2) + '</span></div>' +
                '<div>开票日期：' + (invoiceData.date || '未识别') + '</span></div>' +
                '<div>销售方：' + (invoiceData.seller_name || '未识别') + '</span></div>' +
                '</div>';
        }

        // 显示发票汇总
        function showInvoiceSummary() {
            if(!invoiceData) return;

            const summaryDiv = document.getElementById('invoiceSummary');
            const total = (invoiceData.amount || 0).toFixed(2);

            summaryDiv.innerHTML = '<div class="invoice-card"><h3>发票信息汇总</h3>' +
                '<div class="invoice-info">' +
                '<div>发票金额：<span>¥' + total + '</span></div>' +
                '</div>';

            if(invoiceData.amount) {
                document.getElementById('amount').value = invoiceData.amount;
            }
        }

        // 提交申请
        async function submitApplication() {
            const applicant = document.getElementById('applicant').value.trim();
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const department = document.getElementById('department').value.trim();
            const description = document.getElementById('description').value.trim();

            if(!applicant) {
                alert('请输入申请人姓名');
                return;
            }

            if(!amount || amount <= 0) {
                alert('请输入有效的申请金额');
                return;
            }

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        applicant: applicant,
                        department: department,
                        amount: amount,
                        description: description
                    })
                });

                const data = await res.json();

                if(data.success) {
                    showAuditResult(data.result);
                } else {
                    alert('提交失败：' + data.error);
                }
            } catch(e) {
                alert('提交失败：' + e);
            }
        }

        // 显示审核结果
        function showAuditResult(result) {
            const resultDiv = document.getElementById('auditResult');
            const isPassed = result.passed;

            resultDiv.innerHTML = '<div class="result-card ' + (isPassed ? 'pass' : 'fail') + '">' +
                '<h3>' + (isPassed ? '✅ 审核通过' : '❌ 审核不通过') + '</h3>' +
                '<div class="invoice-info">' +
                '<div>申请人：<span>' + result.applicant + '</span></div>' +
                '<div>申请金额：<span>¥' + result.amount.toFixed(2) + '</span></div>' +
                '<div>发票总额：<span>¥' + result.total_invoice.toFixed(2) + '</span></div>' +
                '<div>金额差异：<span>¥' + result.diff.toFixed(2) + '</span></div>' +
                '</div>';

            goToStep(4);
        }

        // 重新开始
        async function resetAll() {
            await fetch('/api/clear', { method: 'POST' });
            location.reload();
        }
    </script>
</body>
</html>
